<script>
  const searchData = JSON.parse("[{\"title\":\"Часопис Мавки\",\"content\":\"# Часопис Мавки\\n\\nЧасопис Мавки зберігає різну текстову інформацію, що стосується Мавки. Новини,\\nоновлення, інструкції, деталі, цікавинки й т.д.\",\"path\":\"index.html\"},{\"title\":\"Мавка 0.124.0 | Часопис Мавки\",\"content\":\"# Мавка 0.124.0\\n\\nДеякі проблеми вимагають почати знову. Мавка 0.124.0 має ще раз переписану Машину Мавки, яка працює тепер правильніше.\\n\\nБуло прибрано підтримку розширень. Розширення будуть повернені коли Ціль буде в +- стабільному стані (тобто коли буде повноцінна, відтестована та правильна компіляція Цілі в ПМ, а ПМ в LLVM).\\n\\nЗавдяки цьому оновленню Мавка тепер доступна для більшості популярних платформ (Linux/MacOS/Windows, x86_64/AArch64, Android, WASM64).\\nНаразі, для платформ відмінних від Linux x86_64 функціонал є обмеженим, так як я працюю саме з Linux x86_64. Допомога з іншими платформами вітається.\\n\\nПрибрано не дуже потрібні чародії (необхідні залишено).\\n\\nЛогічне прибрано. Замість `так`, `ні` і `пусто` тепер `дійсне` і `недійсне`. Всі предмети наслідуються від дійсного.\\n\\nВсі структури тепер з великої букви.\\n\\nПрибрано наслідування структур.\\n\\nМавка 0.124.0 є без деяких модулів бібліотеки, які має бути додано в подальших оновленнях.\\nІ в загальному, пріоритет тепер на бібліотеку, а не розширення.\\n\\nТакож додано [дозвіл](https://github.com/mavka-ukr/mavka/blob/main/%D0%94%D0%9E%D0%97%D0%92%D0%86%D0%9B), що надає можливість вільно поширювати чи покращувати (змінювати) Мавку.\\n\\n---\\n\\n- [Завантажити Мавку 0.124.0](https://мавка.укр/архів/%D0%B2%D0%B8%D0%BF%D1%83%D1%81%D0%BA-%D0%BC%D0%B0%D0%B2%D0%BA%D0%B8-0.124.0.html)\\n- [GitHub](https://github.com/mavka-ukr/mavka)\\n\\n---\\n\\n_Написав [КДБ](https://кдб.укр). Опубліковано 24.12.2025._\\n\",\"path\":\"2025-12-24-мавка-0-124-0.html\"},{\"title\":\"Цикл подій, tcp, планувальник - Мавка 0.121.0 | Часопис Мавки\",\"content\":\"# Мавка 0.121.0\\n\\nНе пройшло і... Ех, час летить. Але й Мавка не стоїть на місці.\\n\\nОсновним нововведенням Мавки 0.121.0 є так званий \\\"цикл подій\\\".\\nЯкщо коротко, то це штука, яка дозволяє втілити так звану \\\"асинхронність\\\" використовуючи лише один \\\"потік\\\".\\nЯкщо простіше, то ця річ дозволяє відкладати виконання дій.\\n\\nДо прикладу, ви хочете відкласти виконання якоїсь дії на декілька секунд, але не хочете\\nблокувати виконання поточної дії. Хто знайомий з JavaScript, зробити це можна через setTimeout.\\nТепер можна і в Мавці:\\n\\n```мавка\\nвзяти біб планувальник [відкласти]\\n\\nдія привітатись()\\n  друк(\\\"Привіт! :)\\\")\\nкінець\\n\\nвідкласти(привітатись, 2000) ;; 2 сек\\n\\nдрук(\\\"Я перший ;)\\\")\\n```\\n\\nЯк це працює:\\n\\n1. Виконавши `відкласти`, Мавка зберегла дію `привітатись` та попросила операційну систему повідомити, коли пройде 2000\\n   мс.\\n2. Після виконання останньої інструкції (`друк(\\\"Я перший ;)\\\")`) Мавка запускає так званий \\\"цикл подій\\\",\\n   який блокує поточний \\\"потік\\\" допоки операційна система не скаже, що пройшло 2000 мс.\\n3. Як тільки операційна система сповістила, Мавка передає в Машину дію `привітатись`, яка її й виконує.\\n4. Після виконання `привітатись` Мавка знову запускає цей цикл, але, так як більше немає запланованих завдань,\\n   то цикл зупиняться і відбувається вихід з програми.\\n\\nЗавдяки \\\"циклу подій\\\" в Мавці тепер також можна запускати \\\"асинхронні\\\" \\\"tcp-сервер\\\" та \\\"tcp-клієнт\\\". А також повторювати\\nвиконання певної дії з певним інтервалом.\\n\\n<details>\\n<summary>tcp-сервер</summary>\\n\\n```мавка\\nвзяти біб інтернет\\n\\nдія обробити_зупинку_обслуговувача(обслуговувач, помилка)\\n  якщо помилка\\n    друк(\\\"зупинено з помилкою\\\", помилка)\\n  інакше\\n    друк(\\\"зупинено\\\")\\n  кінець\\nкінець\\n\\nдія обробити_дані_звʼязку(звʼязок, дані)\\n  вивести(\\\"отримано\\\", юнікод(дані))\\n  інтернет.надіслати(дані, звʼязок)\\n\\n  вивести(\\\"надіслано\\\", юнікод(дані))\\nкінець\\n\\nдія обробити_закінчення_звʼязку(звʼязок, помилка)\\n  друк(\\\"клієнт закінчив повідомлення\\\")\\nкінець\\n\\nдія обробити_відключення_звʼязку(звʼязок, помилка)\\n  якщо помилка\\n    друк(\\\"відключено з помилкою\\\", помилка)\\n  інакше\\n    друк(\\\"відключено\\\")\\n  кінець\\nкінець\\n\\nдія обробити_підключення_звʼязку_обслуговувача(обслуговувач, звʼязок, помилка)\\n  якщо помилка\\n    друк(\\\"помилка підключення\\\", помилка)\\n  інакше\\n    друк(\\\"підключено\\\", звʼязок)\\n\\n    звʼязок.обробник_даних = обробити_дані_звʼязку\\n    звʼязок.обробник_закінчення = обробити_закінчення_звʼязку\\n    звʼязок.обробник_відключення = обробити_відключення_звʼязку\\n  кінець\\nкінець\\n\\nдія обробити_запуск_обслуговувача(обслуговувач, помилка)\\n  якщо помилка\\n    друк(\\\"помилка запуску\\\", помилка)\\n  інакше\\n    обслуговувач.обробник_зупинки = обробити_зупинку_обслуговувача\\n    обслуговувач.обробник_підключення_звʼязку = обробити_підключення_звʼязку_обслуговувача\\n    друк(\\\"запущено\\\")\\n  кінець\\nкінець\\n\\nінтернет.обслуговувати(\\n  \\\"0.0.0.0\\\",\\n  8080,\\n  обробити_запуск_обслуговувача\\n)\\n```\\n\\n</details>\\n\\n<details>\\n<summary>tcp-клієнт</summary>\\n\\n```мавка\\nвзяти біб інтернет\\n\\nдія обробити_дані_звʼязку(звʼязок, дані)\\n  вивести(\\\"отримано\\\", юнікод(дані))\\nкінець\\n\\nдія обробити_закінчення_звʼязку(звʼязок, помилка)\\n  друк(\\\"обслуговувач закінчив повідомлення\\\")\\nкінець\\n\\nдія обробити_відключення_звʼязку(звʼязок, помилка)\\n  якщо помилка\\n    друк(\\\"відключено з помилкою\\\", помилка)\\n  інакше\\n    друк(\\\"відключено\\\")\\n  кінець\\nкінець\\n\\nдія обробити_підключення_звʼязку(звʼязок, помилка)\\n  якщо помилка\\n    друк(\\\"помилка підключення\\\", помилка)\\n  інакше\\n    друк(\\\"підключено\\\", звʼязок)\\n\\n    звʼязок.обробник_даних = обробити_дані_звʼязку\\n    звʼязок.обробник_закінчення = обробити_закінчення_звʼязку\\n    звʼязок.обробник_відключення = обробити_відключення_звʼязку\\n\\n    інтернет.надіслати(ю\\\"привіт\\\\n\\\", звʼязок)\\n    вивести(\\\"надіслано\\\", ю\\\"привіт\\\\n\\\")\\n  кінець\\nкінець\\n\\nінтернет.звʼязатись(\\n  \\\"127.0.0.1\\\",\\n  8080,\\n  обробити_підключення_звʼязку\\n)\\n```\\n\\n</details>\\n\\n<details>\\n<summary>періодичне виконання</summary>\\n\\n```мавка\\nвзяти біб планувальник\\n\\nк = 0\\n\\nп = планувальник.періодично(дія()\\n  к := к + 1\\n\\n  друк(\\\"кількість\\\", к)\\n\\n  якщо к == 10\\n    планувальник.скасувати_періодичне(п)\\n  кінець\\nкінець, 1000)\\n```\\n\\n</details>\\n\\n> \\\"цикл подій\\\" в Мавці використовує io_uring, який не підтримується на Linux нижче 5.1 версії\\n\\nТакож інші зміни:\\n\\n- додано структуру `Буфер` (аналог структури `байти`, тільки дані всередині можна змінювати)\\n- різні загальні покращення та виправлення\\n\\nЧаПи:\\n\\n<details>\\n<summary>Коли буде бета Мавки?</summary>\\n\\nСинтаксично мова дозріла. З того, що я зараз бачу, то є ще різні речі в Машині, над якими необхідно попрацювати.\\nТакож в бета Мавці має бути стабільний РМв1.\\nПісля цього ще провести загальний аналіз, \\\"рефакторинг\\\" тощо.\\n\\nАле не обовʼязково чекати бету чи випуск, щоб пробувати щось втілювати Мавкою.\\nЯкщо вам чогось не вистачає, завжди можна додати це власноруч ;)\\n\\n</details>\\n\\n<details>\\n<summary>Коли буде випуск Мавки 1.0.0?</summary>\\n\\nНе раніше бета Цілі.\\n\\n</details>\\n\\n---\\n\\nСпробувати Мавку 0.121.0:\\n\\n- [Завантажити Мавку 0.121.0 з Архіву](https://мавка.укр/архів/%D0%B2%D0%B8%D0%BF%D1%83%D1%81%D0%BA-%D0%BC%D0%B0%D0%B2%D0%BA%D0%B8-0.121.0.html)\\n- [Як просто і швидко збудувати Мавку на Linux?](./2025-02-28-будуємо-мавку-на-linux-швидкий-спосіб.html)\\n- [Як збудувати Мавку на Linux з джерельних файлів?](./2025-02-28-будуємо-мавку-на-linux.html)\\n\\n---\\n\\n_Написав [Давид](https://кдб.укр). Опубліковано 27.05.2025._\\n\",\"path\":\"2025-05-26-мавка-0-121-0.html\"},{\"title\":\"Будуємо Мавку на GNU/Linux (швидкий спосіб) | Часопис Мавки\",\"content\":\"# Будуємо Мавку на GNU/Linux (швидкий спосіб)\\n\\n> УВАГА: ця інструкція більше не актуальна починаючи з версії Мавки 0.122.3.\\n\\nЯк просто і швидко збудувати Мавку на Linux? Читайте далі.\\n\\n## Встановлення залежностей\\n\\nВам будуть потрібні **Ціль**, **Clang**, **Git** та деякі _C libs_.\\n\\nВстановлення залежностей на **Ubuntu Linux**:\\n\\n```shell\\nsudo apt install git clang libreadline-dev liburing-dev libidn2-dev\\n```\\n\\nВстановлення залежностей на **Arch Linux**:\\n\\n```shell\\nsudo pacman -S git clang readline liburing libidn2\\n```\\n\\n## Будування\\n\\nКлонуємо репозиторій з підготовленими файлами:\\n\\n```shell\\ngit clone https://github.com/mavka-ukr-static/mavka-linux-x86_64 --depth=1\\n```\\n\\nВідкриваємо клоновану теку:\\n\\n```shell\\ncd mavka-linux-x86_64\\n```\\n\\nБудуємо:\\n\\n```shell\\nsh build.sh\\n```\\n\\nПробуємо:\\n\\n```\\n./out/мавка\\n```\\n\\nДля зручності, Мавку можна встановити глобально:\\n\\n```shell\\nsudo cp ./out/мавка /usr/local/bin\\n```\\n\\n---\\n\\nЧитайте також:\\n\\n- [Як збудувати Мавку на Linux з джерельних файлів?](./2025-02-28-будуємо-мавку-на-linux.html)\\n\\n---\\n\\n_Написав [Давид](https://кдб.укр). Опубліковано 28.02.2025. Оновлено 27.05.2025_\\n\",\"path\":\"2025-02-28-будуємо-мавку-на-linux-швидкий-спосіб.html\"},{\"title\":\"Будуємо Мавку на GNU/Linux | Часопис Мавки\",\"content\":\"# Будуємо Мавку на GNU/Linux\\n\\n> УВАГА: ця інструкція більше не актуальна починаючи з версії Мавки 0.123.0.\\n\\nЯк збудувати Мавку на Linux з джерельних файлів? Читайте далі.\\n\\n## Встановлення залежностей\\n\\nВам будуть потрібні **Ціль**, **Clang**, **Git** та деякі _C libs_.\\n\\nВстановлення залежностей на **Ubuntu Linux**:\\n\\n```shell\\nsudo apt install git clang libreadline-dev liburing-dev libidn2-dev\\n```\\n\\nВстановлення залежностей на **Arch Linux**:\\n\\n```shell\\nsudo pacman -S git clang readline liburing libidn2\\n```\\n\\nПісля встановлення залежностей вище, треба завантажити та встановити **Ціль**.\\n\\nВ [репозиторії Мавки](https://github.com/mavka-ukr/mavka) треба дізнатись необхідну версію\\nЦілі та завантажити її з [Архіву Цілі](https://архів.ціль.укр).\\n\\nПісля завантаження, архів необхідно розпакувати та скопіювати звідти виконуваний файл `ціль` в теку `/usr/local/bin`\\n\\nДалі треба перевірити чи Ціль встановлено. Для цього достатньо у вашому терміналі прописати команду\\n`ціль`: якщо виведе\\nверсію і додаткову інформацію - все добре.\\n\\n## Будування\\n\\nКлонуємо репозиторій Мавки:\\n\\n```shell\\ngit clone https://github.com/mavka-ukr/mavka --depth=1\\n```\\n\\nВідкриваємо клоновану теку:\\n\\n```shell\\ncd mavka\\n```\\n\\nБудуємо:\\n\\n```shell\\nTSIL=\\\"ціль\\\" sh external/scripts/build.sh\\n```\\n\\nПереходимо в теку будування відповідної версії:\\n\\n```shell\\ncd будування/{версія}/лінукс-ікс86_64\\n```\\n\\nПробуємо:\\n\\n```shell\\n./готове/мавка\\n```\\n\\nДля зручності, Мавку можна встановити глобально:\\n\\n```shell\\nsudo cp ./готове/мавка /usr/local/bin\\n```\\n\\n---\\n\\n_Написав [Давид](https://кдб.укр). Опубліковано 28.02.2025. Оновлено 03.11.2025._\\n\",\"path\":\"2025-02-28-будуємо-мавку-на-linux.html\"},{\"title\":\"Новий розбирач Мавки | Часопис Мавки\",\"content\":\"# Новий розбирач Мавки\\n\\nНарешті! <subject>Мавка</subject> тепер має свій власний рукописний розбирач,\\nнаписаний мовою <subject>Ціль</subject>.\\n\\nANTLR4 була останньою ***жирною*** залежністю <subject>Мавки</subject> від C/C++. Позбувшись її, <subject>\\nМавка</subject> тепер дуже\\nблизько до першої бета-версії 1.0.0.\\n\\nДо речі, новий розбирач працює набагато швидше за той, що був на ANTLR4. У мене тести виконуються\\n**в 10 разів швидше** - з ~1000 мс впало до ~100 мс...\\n\\n---\\n\\n_Написав [Давид](https://кдб.укр). Опубліковано 27.02.2025._\",\"path\":\"2025-02-27-новий-розбирач-мавки.html\"},{\"title\":\"Переїзд вебсервісів Мавки | Часопис Мавки\",\"content\":\"# Переїзд версервісів Мавки\\n\\nЗі с \" viewBox=\\\"0 0 5 8\\\" fill=\\\"none\\\" xmlns=\\\"http://www.w3.org/2000/svg\\\"><rect width=\\\"5\\\" height=\\\"8\\\" fill=\\\"transparent\\\"/><rect x=\\\"2\\\" y=\\\"2\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"1\\\" y=\\\"1\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"1\\\" y=\\\"1\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect y=\\\"2\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect y=\\\"3\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"1\\\" y=\\\"4\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"2\\\" y=\\\"5\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"3\\\" y=\\\"4\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"4\\\" y=\\\"3\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"4\\\" y=\\\"2\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/><rect x=\\\"3\\\" y=\\\"1\\\" width=\\\"1\\\" height=\\\"1\\\" fill=\\\"currentColor\\\"/></svg></div>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               | 124 | <small>0ш</small>7В | <small>0д</small>1111100 | <code>❤</code> = 10084 <small>\\\\[226, 157, 164]</small> |\\n| Пропуск                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      | 125 | <small>0ш</small>7Г | <small>0д</small>1111101 | 32                                                     |\\n| Міжряд                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       | 126 | <small>0ш</small>7Д | <small>0д</small>1111110 | 10                                                     |\\n| <div style=\\\"display: flex; align-items: center\\\"><div style=\\\"height: 14px; width: 14px; display: flex; align-items: center;\\\"><svg width=\\\"100\\\" height=\\\"100\\\" viewBox=\\\"0 0 100 100\\\" fill=\\\"none\\\" xmlns=\\\"http://www.w3.org/2000/svg\\\"> <rect y=\\\"45.8995\\\" width=\\\"14\\\" height=\\\"42\\\" transform=\\\"rotate(-45 0 45.8995)\\\" fill=\\\"#B3271A\\\"/> <rect x=\\\"45.8995\\\" y=\\\"99.598\\\" width=\\\"14\\\" height=\\\"42\\\" transform=\\\"rotate(-135 45.8995 99.598)\\\" fill=\\\"#F3D74B\\\"/> <rect x=\\\"99.598\\\" y=\\\"53.6985\\\" width=\\\"14\\\" height=\\\"42\\\" transform=\\\"rotate(135 99.598 53.6985)\\\" fill=\\\"#375BB6\\\"/> <rect x=\\\"53.6985\\\" width=\\\"14\\\" height=\\\"42\\\" transform=\\\"rotate(45 53.6985 0)\\\" fill=\\\"black\\\"/></svg></div></div>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              | 127 | <small>0ш</small>7Е | <small>0д</small>1111111 | 19                                                     |\\n\\n---\\n\\nДодаткові можливості з використанням коду Дії (127):\\n\\n- Код Дії означає, що наступний код є вказівкою (до прикладу змінити колір тексту).\\n- Вказівка 0 означає кінець (якщо це десь необхідно).\\n- Вказівка 126 означає перехід до наступного ряду вказівок (відповідно очікується, що наступний код також буде вказівкою).\\n- Вказівка 127 (два коди Дії підряд) означає початок (якщо це десь необхідно).\\n\\n---\\n\\n_Написав [Давид](https://кдб.укр). Опубліковано 03.01.2025. Оновлено 01.11.2025._\\n\",\"path\":\"2025-01-03-дієкод.html\"},{\"title\":\"Порядок 5.0 | Часопис Мавки\",\"content\":\"# Порядок 5.0\\n\\n1. Мова програмування\\n2. Компілятор + assembler + linker\\n3. Операційна система\\n4. Інтернет-імена на основі <subject>Дієкоду</subject>\\n5. ~~Втілити все вище 100% українською мовою до 2030 року~~\\n\\n> Конкретизуючи, ~~до 2030 року~~ <subject>Мавка</subject> має запускатись на 100% україномовній операційній системі\\n> написаній мовою <subject>Ціль</subject> і має\\n> вміти обмінюватись інформацією через інтернет використовуючи україномовні інтернет-імена (а не класичні домени з\\n> punycode).\\n\\n---\\n\\n_Написав [КДБ](https://кдб.укр). Опубліковано 01.01.2025. Оновлено сьогодні 04.01.2026._\\n\",\"path\":\"2025-01-01-порядок-5.html\"},{\"title\":\"Створюємо розширення Мавки | Часопис Мавки\",\"content\":\"# Як створити просте розширення Мавки?\\n\\n> УВАГА: ця інструкція не актуальна.\\n\\nМавку, ще з часів JavaScript версії, можна розширювати. Раніше, очевидно, за допомогою JavaScript. На\\nщастя, Мавка вже відійша від JS, тому сьогодні розширюватимемо за допомогою Цілі.\\n\\nУ цьому дописі я покажу як просто можна виконувати код на Цілі з Мавки. Але навіть\\nбільше — код на Сі через Ціль з Мавки.\\n\\nОтож, поїхали. Для цього нам будуть треба останні версії Мавки, Цілі та Clang.\\nНа момент написання\\nцього допису в мене\\nверсія [Мавки 0.121.3](https://мавка.укр/архів/%D0%B2%D0%B8%D0%BF%D1%83%D1%81%D0%BA-%D0%BC%D0%B0%D0%B2%D0%BA%D0%B8-0.121.3.html),\\nверсія [Цілі 0.40.0](https://xn--k1avt2b.xn--j1amh)\\nта Clang.\\n\\nТакож треба файл `РМв1.в.ц`.\\n\\nСтруктура директорії проекту буде така:\\n\\n```\\nрозширення_мавки_сума/\\n├─ РМв1.в.ц\\n├─ sum_mavka_extension.c\\n├─ розширення_мавки_сума.ц.ll\\n├─ розширення_мавки_сума.so\\n├─ розширення_мавки_сума.ц\\n└─ тест_розширення_сума.м\\n```\\n\\nСтворюємо файл `sum_mavka_extension.c` з наступним вмістом:\\n\\n```c\\n#define р64 double\\n\\nextern р64 додати_в_сі(р64 а, р64 б) {\\n  return а + б;\\n}\\n```\\n\\nСтворюємо файл `розширення_мавки_сума.ц` з наступним вмістом:\\n\\n```tsil\\nвзяти визначення РМв1;\\n\\nзовнішня дія додати_в_сі(а: р64, б: р64): р64;\\n\\nдія рідна_дія_сума(Р: адреса<РМв1::Розширення>, предмет_дії: адреса<РМв1::Предмет>, предмет_я: адреса<РМв1::Предмет>, кількість_аргументів: натуральне, аргументи: памʼять<адреса<РМв1::Предмет>>, іменовані_аргументи: адреса<РМв1::ІменованіАргументи>): РМв1::ПредметАбоСтанПадіння {\\n  змінна знайдено_аргумент_а = ні;\\n  змінна аргумент_а: адреса<РМв1::Предмет> = пусто;\\n  змінна знайдено_аргумент_б = ні;\\n  змінна аргумент_б: адреса<РМв1::Предмет> = пусто;\\n  якщо іменовані_аргументи != пусто {\\n    знайдено_аргумент_а = РМв1::знайти_іменований_аргумент(Р, іменовані_аргументи, РМв1::назва(Р, \\\"а\\\"), аргумент_а::адреса);\\n    знайдено_аргумент_б = РМв1::знайти_іменований_аргумент(Р, іменовані_аргументи, РМв1::назва(Р, \\\"б\\\"), аргумент_б::адреса);\\n  }\\n  якщо знайдено_аргумент_а == ні {\\n    якщо кількість_аргументів > 0 {\\n      знайдено_аргумент_а = так;\\n      аргумент_а = аргументи[0];\\n    }\\n  }\\n  якщо знайдено_аргумент_б == ні {\\n    якщо кількість_аргументів > 1 {\\n      знайдено_аргумент_б = так;\\n      аргумент_б = аргументи[1];\\n    }\\n  }\\n  якщо знайдено_аргумент_а == ні {\\n    вернути РМв1::падіння(Р, РМв1::створити_текст(Р, \\\"Пропущено аргумент \\\\\\\"а\\\\\\\"\\\"));\\n  }\\n  якщо знайдено_аргумент_б == ні {\\n    вернути РМв1::падіння(Р, РМв1::створити_текст(Р, \\\"Пропущено аргумент \\\\\\\"б\\\\\\\"\\\"));\\n  }\\n  якщо РМв1::перевірити_чи_предмет_є_числом(Р, аргумент_а) == ні {\\n    вернути РМв1::падіння(Р, РМв1::створити_текст(Р, \\\"Аргумент \\\\\\\"а\\\\\\\" має бути числом\\\"));\\n  }\\n  якщо РМв1::перевірити_чи_предмет_є_числом(Р, аргумент_б) == ні {\\n    вернути РМв1::падіння(Р, РМв1::створити_текст(Р, \\\"Аргумент \\\\\\\"б\\\\\\\" має бути числом\\\"));\\n  }\\n  змінна а = РМв1::отримати_значення_числа(Р, аргумент_а);\\n  змінна б = РМв1::отримати_значення_числа(Р, аргумент_б);\\n  змінна результат = додати_в_сі(а, б);\\n  вернути РМв1::створити_число(Р, результат);\\n}\\n\\nзовнішня дія завантажити_РМв1(Р: адреса<РМв1::Розширення>): РМв1::ПредметАбоСтанПадіння {\\n  вернути РМв1::створити_рідну_дію(\\n    Р,\\n    РМв1::назва(Р, \\\"сума\\\"),\\n    0,\\n    пусто,\\n    пусто,\\n    рідна_дія_сума\\n  );\\n}\\n```\\n\\nКомпілюємо shared object `розширення_мавки_сума.so` за допомогою наступних команд:\\n\\n```shell\\nціль розширення_мавки_сума.ц.ll скомпілювати розширення_мавки_сума.ц\\n```\\n\\n```shell\\nclang -shared -fPIC -o розширення_мавки_сума.so розширення_мавки_сума.ц.ll sum_mavka_extension.c\\n```\\n\\nСтворюємо модуль Мавки `тест_розширення_сума.м`:\\n\\n```мавка\\nвзяти біб мавка\\n\\nрозширення_мавки_сума = мавка.завантажити_РМв1(ю\\\"./розширення_мавки_сума.so\\\")\\n\\nдрук(розширення_мавки_сума.значення(2, 2))\\n```\\n\\nПробуємо:\\n\\n```shell\\nмавка тест_розширення_сума.м\\n```\\n\\nМає надрукувати `4`.\\n\\nОтож, як видно, виконувати нативний код на Цілі чи Сі з Мавки досить просто.\\nГоловне розібратись з файлом `РМв1.в.ц` та вміти працювати з Ціллю.\\n\\n---\\n\\n_Написав [Давид](https://кдб.укр). Опубліковано 01.12.2024. Оновлено 17.07.2025._\\n\",\"path\":\"2024-12-01-створюємо-розширення-мавки.html\"},{\"title\":\"У Мавки реформа! | Часопис Мавки\",\"content\":\"# У Мавки реформа!\\n\\nБуло оновлено вебсайт. Тепер він більш структурований, статичний та простий.\\n\\nБільшість вмісту вебсайту тепер зберігається в майже чистому текстовому форматі (наразі Markdown), який скриптом\\nперетворюється в HTML. Окрім того, що <keyword>це</keyword> дозволяє концентруватись на самому тексті під час\\nредагування, <keyword>це</keyword> також\\nу майбутньому дозволить легко перетворювати документацію на власний формат візуальних документів.\\n\\n<subject>Документацію</subject> було повністю переписано. Більш точно розділено <subject>Практику\\nМавки</subject>, <subject>Теорію\\nМавки</subject> та вбудовані визначення <subject>Мавки</subject>. Ще не все добре описано, але\\nінформація тепер має читатись та сприйматись краще.\\n\\n<subject>Документація</subject> відтепер буде включатись у випуски <subject>Мавки</subject>.\\n\\nДодано нові\\nвебресурси: <subject>[Архів Мавки](https://архів.мавка.укр)</subject>, <subject>[Часопис Мавки](https://мавка.укр/часопис/index.html)</subject>,\\n<subject>[Інформація Мавки](https://мавка.укр/інформація/index.html)</subject>.\\n\\n<subject>Бібліотеку Мавки</subject> очищено — тепер вона націлена на надання лише основних необхідних\\nмодулів\\n(Математика, <subject>Дід</subject> та ще деякі\\nзгодом). Всі решта передаються творцям паків.\\n\\nПочато працю над новим [пак.укр](https://пак.укр). Код згодом буде відкритий, можна буде долучитись\\nна [GitHub-і](https://github.com/mavka-ukr/pak-ukr).\\n\\nВебресурси [бавитись.мавка.укр](https://бавитись.мавка.укр) та [фрагмент.укр](https://фрагмент.укр)\\nпоставлені на паузу підтримки. Їх не планується оновлювати\\nнайближчі 6 місяців. Вони працюватимуть й далі в такому вигляді як зараз.\\n\\nРозробка <subject>Машини Мавки</subject> та самої <subject>Мавки</subject> ведеться на приватному\\ngit-сервері. Попри <keyword>це</keyword>,\\n<subject>Код Мавки</subject> є відкритим. На GitHub-і ж\\nнатомість знаходиться лише bug-tracker — тобто проблеми, питання та пропозиції треба писати там. На\\nGitHub-і\\nв цілому ведеться розробка і публікація лише тих проектів, які не є під <subject>\\nПравом\\nАвтора</subject>.\\n\\nСхожі зміни планується застосувати й для <subject>[Цілі](https://ціль.укр)</subject>.\\n\\nНадалі я хочу сконцентруватись над <subject>Машиною Мавки</subject>, <subject>Мавкою</subject>,\\n<subject>Компілятором Цілі</subject>, <subject>Ціллю</subject> та основою нового\\nпрограмування.\\n\\n---\\n\\n_Написав [Давид](https://кдб.укр). Опубліковано 08.09.2024._\",\"path\":\"2024-09-08-реформа.html\"}]");
